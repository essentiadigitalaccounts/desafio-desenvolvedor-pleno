services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalogo-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - catalogo

  nginx:
    image: nginx:alpine
    container_name: catalogo-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - catalogo

  mysql:
    image: mysql:8.0
    container_name: catalogo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: catalogo
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - catalogo

volumes:
  mysql_data:

networks:
  catalogo:
    driver: bridge
